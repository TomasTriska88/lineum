<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="22" fill="#050505" />
  
  <g filter="url(#glow)">
    <!-- Stylized 'L' / Abstract Field Node -->
    <path d="M 35 25 L 35 75 L 75 75 L 75 62 L 48 62 L 48 25 Z" fill="url(#grad1)" />
    <!-- Particles -->
    <circle cx="35" cy="25" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="75" cy="75" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="35" cy="75" r="3" fill="#fff" opacity="0.5"/>
  </g>
</svg>
