name: Lineum Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-core:
    name: Core (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run fast unit tests
        run: pytest -m "not integration" -v

  test-portal:
    name: Portal (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - name: Install dependencies
        working-directory: portal
        run: npm install
      - name: Run Vitest
        working-directory: portal
        run: npm run test

  test-lab:
    name: Lab (Simulacrum)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lab/package-lock.json
      - name: Install dependencies
        working-directory: lab
        run: npm install
      - name: Run Vitest
        working-directory: lab
        run: npm run test
