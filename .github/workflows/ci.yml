name: Lineum Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dco-check:
    name: DCO Check (Warn Only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify DCO Signatures
        run: |
          # Warn-only check for Signed-off-by
          if ! git log -1 --pretty=%B | grep -q "Signed-off-by:"; then
            echo "::warning title=Missing DCO::We currently require a Developer Certificate of Origin (DCO) for external contributions. Please use 'git commit -s' in the future."
          fi

  test-core:
    name: Core (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run fast unit tests
        run: pytest -m "not integration" -v

  test-portal:
    name: Portal (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - name: Install dependencies
        working-directory: portal
        run: npm install
      - name: Run svelte-check
        working-directory: portal
        run: npm run check
      - name: Run Vitest
        working-directory: portal
        run: npm run test
      - name: Install Playwright Browsers
        working-directory: portal
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E Tests
        working-directory: portal
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: portal/.test-output/report/
          retention-days: 2

  test-lab:
    name: Lab (Simulacrum)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lab/package-lock.json
      - name: Install dependencies
        working-directory: lab
        run: npm install
      - name: Run Vitest
        working-directory: lab
        run: npm run test
