name: Release Reference Pack

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.7'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Execute Golden PyTest Gate (Core & Scripts)
        run: |
          pytest -v

      - name: Execute Whitepaper & Contract Audit Gate
        run: |
          make check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          cd portal && npm install
          cd ../lab && npm install

      - name: Install Playwright Browsers
        run: |
          cd portal && npx playwright install --with-deps chromium
          cd ../lab && npx playwright install --with-deps chromium

      - name: Execute UI Suite Gates (Vitest + Playwright)
        env:
          PUBLIC_SIMULACRUM_URL: 'http://127.0.0.1:5174'
          PUBLIC_ENABLE_API_SOLUTIONS: 'true'
        run: |
          cd portal && npm run test && npm run test:e2e
          cd ../lab && npm run test && npm run test:e2e

      - name: Run audit pipeline (Generate canonical run)
        run: |
          # Generate the canonical spec6_false_s41 run
          python scripts/repro_spec6_false_s41.py

      - name: Download Canonical Reference Pack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p canonical_pack
          gh release download --pattern '*reference_pack*.zip' -D canonical_pack || echo "No previous release found, falling back to strict hash verify"

      - name: Verify and Build Pack
        run: |
          CANONICAL_ZIP=$(ls canonical_pack/*.zip 2>/dev/null | head -n 1 || echo "")
          if [ -n "$CANONICAL_ZIP" ]; then
            echo "Using canonical pack for fuzzy math verification: $CANONICAL_ZIP"
            python scripts/verify_repro_run.py --latest --pack --fuzzy-match "$CANONICAL_ZIP"
          else
            echo "No canonical pack found. Running strict hash verification."
            python scripts/verify_repro_run.py --latest --pack
          fi

      - name: Prepare Release Assets
        id: prepare_assets
        run: |
          ZIP_FILE=$(ls output/repro/packs/*.zip | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: Reference pack not generated."
            exit 1
          fi
          echo "Found generated pack: $ZIP_FILE"
          
          # If triggered by a tag, create a user-friendly alias
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            ALIAS_ZIP="output/repro/packs/lineum_reference_pack_${TAG_NAME}.zip"
            cp "$ZIP_FILE" "$ALIAS_ZIP"
            echo "Created alias: $ALIAS_ZIP"
            echo "alias_zip=$ALIAS_ZIP" >> $GITHUB_OUTPUT
          fi
          
          echo "audit_zip=$ZIP_FILE" >> $GITHUB_OUTPUT

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.prepare_assets.outputs.audit_zip }}
            ${{ steps.prepare_assets.outputs.alias_zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
