name: Python Backend Tests

on:
  workflow_dispatch:
  push:
    branches: [ "dev", "debug-v1.1.6-ci" ]
    paths:
      - 'lineum.py'
      - 'lineum_core/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'lineum.py'
      - 'lineum_core/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run PyTest Suite (Includes Core & Scripts)
      run: |
        pytest -v

    - name: Run Whitepaper & Contract Audit Validation
      run: |
        make check

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      run: |
        cd portal && npm install
        cd ../lab && npm install

    - name: Install Playwright Browsers
      run: |
        cd portal && npx playwright install --with-deps chromium
        cd ../lab && npx playwright install --with-deps chromium

    - name: Execute UI Suite Gates (Vitest + Playwright)
      env:
        PUBLIC_SIMULACRUM_URL: 'http://127.0.0.1:5174'
        PUBLIC_ENABLE_API_SOLUTIONS: 'true'
      run: |
        cd portal && npm run test && npm run test:e2e
        cd ../lab && npm run test && npm run test:e2e
