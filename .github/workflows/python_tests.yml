name: Python Backend Tests

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'lineum.py'
      - 'lineum_core/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'lineum.py'
      - 'lineum_core/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run PyTest Suite (Includes Core & Scripts)
      run: |
        pytest -v

    - name: Run Whitepaper & Contract Audit Validation
      run: |
        make check
