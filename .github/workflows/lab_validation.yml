name: "Lab Validation Gate"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-golden:
    name: "Golden Validation Scenarios"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          pip install -r routing_backend/requirements.txt
          pip install pytest pytest-asyncio httpx
          
      - name: Run Pytest Validation Suite (CI Merge Gate)
        run: |
          pytest routing_backend/test_lab_api.py::test_lab_golden_validation_gate -v
