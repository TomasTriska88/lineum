<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ffff" stop-opacity="0.6" />
            <stop offset="50%" stop-color="#00ffff" stop-opacity="1" />
            <stop offset="100%" stop-color="#00ffff" stop-opacity="0.3" />
        </linearGradient>
    </defs>
    
    <rect width="100" height="100" rx="22" fill="#050505" />

    <polygon points="50,5 95,28 95,72 50,95 5,72 5,28" fill="none" stroke="#00ffff" stroke-width="2" stroke-opacity="0.2" />
    <polygon points="50,15 85,33 85,67 50,85 15,67 15,33" fill="none" stroke="#00ffff" stroke-width="1" stroke-opacity="0.5" />

    <path d="M 50 50 C 30 20, 10 20, 10 50 C 10 80, 30 80, 50 50 C 70 20, 90 20, 90 50 C 90 80, 70 80, 50 50 Z" 
          fill="none" stroke="#00ffff" stroke-width="1" stroke-opacity="0.3" />
          
    <path d="M 50 50 C 30 20, 10 20, 10 50 C 10 80, 30 80, 50 50 C 70 20, 90 20, 90 50 C 90 80, 70 80, 50 50 Z" 
          fill="none" stroke="url(#waveGradient)" stroke-width="2" filter="url(#neonGlow)" 
          stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="4" />

    <circle cx="50" cy="50" r="1.5" fill="#ffffff" />
    <circle cx="50" cy="50" r="5" fill="none" stroke="#00ffff" stroke-opacity="0.8" filter="url(#neonGlow)" stroke-width="1" />
</svg>
