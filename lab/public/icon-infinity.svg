<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Background for safe tab contrast -->
    <rect width="100" height="100" rx="22" fill="#050505" />

    <!-- Masivní zesílení pro 16x16 render -->
    <!-- Outer Diamond Hexagon Frame -->
    <polygon points="50,5 95,28 95,72 50,95 5,72 5,28" fill="none" stroke="#00ffff" stroke-width="4" stroke-opacity="0.3" />
    
    <!-- Inner Hexagon -->
    <polygon points="50,15 85,33 85,67 50,85 15,67 15,33" fill="none" stroke="#00ffff" stroke-width="2" stroke-opacity="0.6" />

    <!-- Faint background path -->
    <path d="M 50 50 C 30 20, 10 20, 10 50 C 10 80, 30 80, 50 50 C 70 20, 90 20, 90 50 C 90 80, 70 80, 50 50 Z" 
          fill="none" stroke="#00ffff" stroke-width="2" stroke-opacity="0.4" />

    <!-- Infinity Wave Loop (Almost drawn static gap) -->
    <!-- Zesíleno na 6px aby to ve faviconě nezaniklo -->
    <path d="M 50 50 C 30 20, 10 20, 10 50 C 10 80, 30 80, 50 50 C 70 20, 90 20, 90 50 C 90 80, 70 80, 50 50 Z" 
          fill="none" stroke="#00ffff" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="250" stroke-dashoffset="10" />

    <!-- Pulsing Central Excitations -->
    <circle cx="50" cy="50" r="3" fill="#ffffff" />
    <circle cx="50" cy="50" r="6" fill="none" stroke="#00ffff" stroke-opacity="0.9" stroke-width="2" />
</svg>
